[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python init_db.py && python first_vector_embedding.py && streamlit run insurance_agents_main.py --server.port $PORT --server.address 0.0.0.0 --server.headless true"
healthcheckPath = "/_stcore/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
