[build]
builder = "NIXPACKS"

[deploy]
startCommand = "/opt/venv/bin/python init_db.py && /opt/venv/bin/python first_vector_embedding.py && /opt/venv/bin/streamlit run insurance_agents_main.py --server.port $PORT --server.address 0.0.0.0 --server.headless true"
healthcheckPath = "/_stcore/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
