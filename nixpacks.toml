[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "gcc", "postgresql"]

[phases.install]
cmds = [
    "python -m venv /opt/venv",
    "/opt/venv/bin/pip install --upgrade pip",
    "/opt/venv/bin/pip install -r requirements.txt"
]

[start]
cmd = "/opt/venv/bin/python init_db.py && /opt/venv/bin/python first_vector_embedding.py && /opt/venv/bin/streamlit run insurance_agents_main.py --server.port $PORT --server.address 0.0.0.0 --server.headless true"
